apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: turbo
  labels:
    app: frontend
spec:
  selector:
    matchLabels:
      app: frontend
  replicas: 1
  template:
    metadata:
      labels:
        app: frontend
    spec:
      imagePullSecrets:
        - name: backend-service
      containers:
        - name: frontend
          image: xinghuo-registry.cn-beijing.cr.aliyuncs.com/rta/frontend-service:v${BUILD_NUMBER}
          imagePullPolicy: Always
          securityContext:
            privileged: true
          ports:
            - containerPort: 80
              name: web
              protocol: TCP
            - containerPort: 443
              name: web2
              protocol: TCP
          resources:
            requests:
              memory: "10Gi"
              cpu: "12000m"
            limits:
              memory: "10Gi"
              cpu: "12000m"
