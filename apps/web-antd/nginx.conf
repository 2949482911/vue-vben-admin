# 虚拟主机配置：仅负责单个站点的局部配置（不能包含全局指令）

server {
    listen 80;
    server_name localhost;  # 生产环境替换为实际域名
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name localhost;
    root /usr/share/nginx/html;  # Vue 打包后的 dist 目录
    index index.html;
    ssl_certificate /etc/nginx/ssl/web.starfiread.com.pem;
    ssl_certificate_key /etc/nginx/ssl/web.starfiread.com.key;

    ssl_protocols TLSv1.2 TLSv1.3;  # 仅支持现代TLS协议（禁用不安全的SSLv3、TLSv1.0/1.1）
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;  # 优先使用服务器定义的加密套件
    ssl_session_cache shared:SSL:10m;  # 会话缓存（提升性能）
    ssl_session_timeout 1d;  # 会话超时时间
    ssl_stapling on;  # 启用OCSP stapling（减少SSL握手时间）
    ssl_stapling_verify on;  # 验证OCSP响应


    # 1. 静态资源缓存优化（JS/CSS/图片等）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;                # 缓存7天
        add_header Cache-Control "public, max-age=604800";  # 秒级缓存时间
        add_header ETag "";        # 禁用ETag，减少304请求
        access_log off;            # 关闭静态资源访问日志
    }

    # 2. 前端路由支持（解决 Vue Router History 模式刷新404问题）
    location / {
        try_files $uri $uri/ /index.html;  # 重定向到 index.html
        expires -1;                     # 禁止缓存（路由页面实时更新）
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # 3. 反向代理后端 API（避免跨域问题）
    location /api/ {
        proxy_pass https://turbo.starfiread.com/;  # 后端服务地址（Docker Compose 内部域名）
        proxy_set_header Host $host;         # 传递客户端 Host 头
        proxy_set_header X-Real-IP $remote_addr;  # 传递真实客户端IP
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # 传递代理链IP
        proxy_set_header X-Forwarded-Proto $scheme;  # 传递协议（http/https）
        proxy_set_header Authorization $http_authorization;
        proxy_connect_timeout 30s;           # 连接超时时间
        proxy_read_timeout 60s;              # 读取超时时间（适配后端长处理）
        proxy_send_timeout 30s;              # 发送超时时间
        proxy_buffering on;                  # 启用代理缓冲（提升响应速度）
        proxy_buffer_size 16k;               # 缓冲大小
        proxy_buffers 4 64k;                 # 缓冲池配置
    }

    # 4. 压缩配置（减少传输体积，提升加载速度）
    gzip on;
    gzip_min_length 1k;                # 最小压缩文件大小
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;  # 压缩类型
    gzip_vary on;                      # 支持 Vary 头（适配不同客户端）
    gzip_comp_level 6;                 # 压缩级别（1-9，6为平衡值）
    gzip_buffers 4 16k;                # 压缩缓冲
    gzip_http_version 1.1;             # 支持的HTTP版本
}
